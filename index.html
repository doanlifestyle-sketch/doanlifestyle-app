<script>
let currentAudioBlob = null;

// TTS
async function tts(text){
  const key=document.getElementById("apiKey").value;

  const res=await fetch("https://api.openai.com/v1/audio/speech",{
    method:"POST",
    headers:{
      "Authorization":"Bearer "+key,
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      model:"gpt-4o-mini-tts",
      voice:"fable",
      input:text
    })
  });

  const blob = await res.blob();
  currentAudioBlob = blob;
  return blob;
}

// tách dòng
function split(text){
  return text.split(/\n+/).filter(x=>x);
}

// tạo shot + prompt
function build(text){
  const lines=split(text);
  let shot="";
  let prompt="";

  lines.forEach((l,i)=>{
    shot+=`Cảnh ${i+1}: ${l}\n`;
    prompt+=`Prompt ${i+1}: cinematic scene, ${l}\n\n`;
  });

  return {shot,prompt};
}

// caption
function caption(text){
  return `Một câu chuyện ngắn nhưng chạm sâu cảm xúc...\n\n#NhacKinhThanh #KinhThanh #ChuaYeuBan`;
}

// thumbnail
function thumbnail(text){
  return `Cinematic Christian scene, ${text}, 4K, emotional lighting`;
}

// 🔥 tạo tất cả
async function generateAll(){
  const text=document.getElementById("script").value;

  const blob=await tts(text);
  const url=URL.createObjectURL(blob);
  document.getElementById("audio").src=url;

  const b=build(text);

  document.getElementById("shotlist").textContent=b.shot;
  document.getElementById("prompts").textContent=b.prompt;
  document.getElementById("caption").textContent=caption(text);
  document.getElementById("thumbnail").textContent=thumbnail(text);
}

// 🔥 tải file text
function downloadText(filename, content){
  const blob = new Blob([content], {type:"text/plain"});
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  a.click();
}

// 🔥 tải audio
function downloadAudio(){
  if(!currentAudioBlob){
    alert("Chưa có audio");
    return;
  }

  const url = URL.createObjectURL(currentAudioBlob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "audio.mp3";
  a.click();
}

// 🔥 tải tất cả file
function downloadAll(){
  downloadAudio();

  downloadText("shotlist.txt", document.getElementById("shotlist").textContent);
  downloadText("prompts.txt", document.getElementById("prompts").textContent);
  downloadText("caption.txt", document.getElementById("caption").textContent);
  downloadText("thumbnail.txt", document.getElementById("thumbnail").textContent);
}
</script>
