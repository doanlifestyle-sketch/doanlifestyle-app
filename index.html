<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doanlifestyle TTS Ultra</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#020617,#0f172a);
  color:white;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

h1{
  text-align:center;
  margin-bottom:20px;
}

textarea{
  width:100%;
  height:140px;
  border-radius:12px;
  padding:10px;
  border:none;
  font-size:16px;
}

input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  margin-top:10px;
}

button{
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.btn1{background:#22c55e;color:black;}
.btn2{background:#3b82f6;}
.btn3{background:#f59e0b;color:black;}

.voice{
  background:#1e293b;
  padding:10px;
  border-radius:12px;
  margin-top:10px;
  display:flex;
  justify-content:space-between;
}

</style>
</head>

<body>

<div class="container">

<h1>🔥 Doanlifestyle TTS Ultra</h1>

<p>Dán nội dung bạn muốn đọc:</p>

<textarea id="text">Xin chào bạn...</textarea>

<p>Nhập OpenAI API Key:</p>
<input id="apiKey" placeholder="sk-xxxx..." />

<div style="display:flex;gap:10px;">
<button class="btn1" onclick="generate()">Tạo audio</button>
<button class="btn2" onclick="play()">Phát</button>
<button class="btn3" onclick="download()">Tải</button>
</div>

<h3>🎤 Chọn giọng:</h3>

<div class="voice">alloy <button onclick="setVoice('alloy')">Chọn</button></div>
<div class="voice">ash <button onclick="setVoice('ash')">Chọn</button></div>
<div class="voice">ballad <button onclick="setVoice('ballad')">Chọn</button></div>
<div class="voice">coral <button onclick="setVoice('coral')">Chọn</button></div>
<div class="voice">echo <button onclick="setVoice('echo')">Chọn</button></div>
<div class="voice">fable <button onclick="setVoice('fable')">Chọn</button></div>
<div class="voice">nova <button onclick="setVoice('nova')">Chọn</button></div>

</div>

<script>

let selectedVoice = "alloy";
let audioBlob = null;

function setVoice(v){
  selectedVoice = v;
  alert("Đã chọn giọng: " + v);
}

async function generate(){

  const text = document.getElementById("text").value;
  const key = document.getElementById("apiKey").value;

  if(!key){
    alert("Chưa nhập API key");
    return;
  }

  const res = await fetch("https://api.openai.com/v1/audio/speech",{
    method:"POST",
    headers:{
      "Authorization":"Bearer "+key,
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      model:"gpt-4o-mini-tts",
      voice:selectedVoice,
      input:text
    })
  });

  audioBlob = await res.blob();
  alert("Đã tạo audio!");
}

function play(){
  if(!audioBlob){alert("Chưa tạo audio");return;}
  const url = URL.createObjectURL(audioBlob);
  new Audio(url).play();
}

function download(){
  if(!audioBlob){alert("Chưa tạo audio");return;}
  const url = URL.createObjectURL(audioBlob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "audio.mp3";
  a.click();
}

</script>

</body>
</html>
