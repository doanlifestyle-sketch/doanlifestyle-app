<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doanlifestyle TTS Ultra</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#020617;
  color:white;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

h1{text-align:center;}

textarea{
  width:100%;
  height:120px;
  border-radius:10px;
  padding:10px;
  border:none;
}

input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  margin-top:10px;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  margin-top:10px;
  cursor:pointer;
}

.green{background:#22c55e;color:black;}
.blue{background:#3b82f6;}
.orange{background:#f59e0b;color:black;}

.voice{
  background:#1e293b;
  padding:10px;
  margin-top:8px;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
}
</style>

</head>

<body>

<div class="container">

<h1>🔥 Doanlifestyle TTS Ultra</h1>

<textarea id="text">Xin chào bạn...</textarea>

<input id="apiKey" placeholder="Dán API key vào đây" />

<div>
<button class="green" onclick="generate()">Tạo audio</button>
<button class="blue" onclick="play()">Phát</button>
<button class="orange" onclick="download()">Tải</button>
</div>

<h3>Chọn giọng:</h3>

<div class="voice">alloy <button onclick="setVoice('alloy')">Chọn</button></div>
<div class="voice">nova <button onclick="setVoice('nova')">Chọn</button></div>
<div class="voice">echo <button onclick="setVoice('echo')">Chọn</button></div>
<div class="voice">fable <button onclick="setVoice('fable')">Chọn</button></div>

</div>

<script>

let selectedVoice = "alloy";
let audioBlob = null;

function setVoice(v){
  selectedVoice = v;
  alert("Đã chọn: " + v);
}

async function generate(){

  try{
    const text = document.getElementById("text").value;
    const key = document.getElementById("apiKey").value;

    if(!key){
      alert("Thiếu API key");
      return;
    }

    const res = await fetch("https://api.openai.com/v1/audio/speech",{
      method:"POST",
      headers:{
        "Authorization":"Bearer "+key,
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        model:"gpt-4o-mini-tts",
        voice:selectedVoice,
        input:text
      })
    });

    if(!res.ok){
      alert("API lỗi: " + res.status);
      return;
    }

    audioBlob = await res.blob();
    alert("Tạo audio thành công!");

  }catch(err){
    alert("Lỗi: " + err.message);
  }
}

function play(){
  if(!audioBlob){alert("Chưa tạo audio");return;}
  const url = URL.createObjectURL(audioBlob);
  new Audio(url).play();
}

function download(){
  if(!audioBlob){alert("Chưa tạo audio");return;}
  const url = URL.createObjectURL(audioBlob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "tts.mp3";
  a.click();
}

</script>

</body>
</html>
