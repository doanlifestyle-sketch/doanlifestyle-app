<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>☕ Doanlifestyle Pro Max 50K</title>

<style>

body{
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#6f4e37,#a67c52);
  color:#3b2f2f;
}

h1{
  text-align:center;
  padding:20px;
  color:#fff;
}

/* layout */
.container{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  padding:20px;
}

/* card */
.card{
  background:#f5e6d3;
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

/* textarea */
textarea{
  width:100%;
  height:180px;
  border-radius:15px;
  border:none;
  padding:15px;
  font-size:16px;
  background:#fffaf3;
  color:#3b2f2f;
}

/* input */
input, select{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-top:10px;
  background:#fffaf3;
  color:#3b2f2f;
}

/* buttons */
.buttons{
  display:flex;
  gap:10px;
  margin-top:10px;
}

button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
}

.btn1{background:#6f4e37;color:white;}
.btn2{background:#8d6e63;color:white;}
.btn3{background:#c69c6d;color:white;}
.btn4{background:#a1887f;color:white;}

/* preset */
.preset{
  display:inline-block;
  padding:8px 14px;
  background:#e6d3b3;
  border-radius:20px;
  margin:5px;
  cursor:pointer;
}

/* voice card */
.voice{
  background:#fffaf3;
  padding:12px;
  border-radius:12px;
  margin-top:10px;
  cursor:pointer;
  transition:0.2s;
}

.voice:hover{
  background:#ecd9c6;
}

/* audio box */
.audio-box{
  margin-top:15px;
  background:#fffaf3;
  padding:10px;
  border-radius:10px;
}

/* status */
.status{
  margin-top:10px;
  padding:10px;
  background:#fffaf3;
  border-radius:10px;
}

</style>
</head>

<body>

<h1>☕ Doanlifestyle Pro Max 50K</h1>

<div class="container">

<!-- LEFT -->
<div class="card">

<textarea id="text">Xin chào bạn...</textarea>
<p id="count">0 / 50000 ký tự</p>

<input placeholder="Dán API key">

<div class="buttons">
<button class="btn1">Tạo audio</button>
<button class="btn2">Phát</button>
<button class="btn3">Tải audio</button>
<button class="btn4">Đặt lại</button>
</div>

<div class="audio-box">
▶️ 00:00 / 00:00
</div>

<div class="status">
Sẵn sàng...
</div>

<br>

<!-- preset -->
<div>
<div class="preset">Kể chuyện cảm xúc</div>
<div class="preset">Nhẹ nhàng chữa lành</div>
<div class="preset">Lời dẫn YouTube</div>
<div class="preset">Thuyết minh rõ chữ</div>
<div class="preset">Nam trầm</div>
<div class="preset">Nữ dịu</div>
</div>

</div>

<!-- RIGHT -->
<div class="card">

<h3>🎤 Chọn giọng</h3>

<div class="voice">alloy</div>
<div class="voice">ash</div>
<div class="voice">ballad</div>
<div class="voice">coral</div>
<div class="voice">echo</div>
<div class="voice">fable</div>
<div class="voice">nova</div>
<div class="voice">onyx</div>
<div class="voice">sage</div>
<div class="voice">shimmer</div>
<div class="voice">verse</div>
<div class="voice">marin</div>
<div class="voice">cedar</div>

</div>

</div>

</body>
</html>
