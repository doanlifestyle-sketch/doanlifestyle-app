<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doanlifestyle Pro Max 50K</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#4e342e,#8d6e63);
  color:white;
  padding:20px;
}

.container{
  max-width:900px;
  margin:auto;
}

textarea{
  width:100%;
  height:200px;
  border-radius:10px;
  padding:10px;
}

input{
  width:100%;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}

button{
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.green{background:#6d4c41;color:white}
.blue{background:#8d6e63;color:white}
.orange{background:#c8a98b;color:black}

</style>
</head>

<body>

<div class="container">
<h1>☕ Doanlifestyle Pro Max 50K</h1>

<textarea id="text">Xin chào bạn...</textarea>

<input id="apiKey" placeholder="Dán API key">

<br>

<button class="green" onclick="generate()">Tạo audio</button>
<button class="blue" onclick="play()">Phát</button>
<button class="orange" onclick="download()">Tải</button>

<audio id="audio" controls></audio>

<p id="status">Sẵn sàng...</p>
</div>

<script>

let audioBlob = null;

async function generate(){

  let text = document.getElementById("text").value;
  let key = document.getElementById("apiKey").value;

  if(!key){
    alert("Thiếu API key");
    return;
  }

  document.getElementById("status").innerText = "Đang tạo...";

  try{

    let res = await fetch("https://api.openai.com/v1/audio/speech",{
      method:"POST",
      headers:{
        "Authorization":"Bearer "+key,
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        model:"gpt-4o-mini-tts",
        voice:"fable",
        input:text
      })
    });

    if(!res.ok){
      let err = await res.text();
      throw new Error(err);
    }

    audioBlob = await res.blob();

    document.getElementById("status").innerText = "Đã tạo xong!";

  }catch(e){
    document.getElementById("status").innerText = "Lỗi: "+e.message;
  }
}

function play(){
  if(!audioBlob){
    alert("Chưa có audio");
    return;
  }
  let url = URL.createObjectURL(audioBlob);
  document.getElementById("audio").src = url;
}

function download(){
  if(!audioBlob){
    alert("Chưa có audio");
    return;
  }
  let url = URL.createObjectURL(audioBlob);
  let a = document.createElement("a");
  a.href = url;
  a.download = "audio.mp3";
  a.click();
}

</script>

</body>
</html>
