<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test OK</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
    }
    .wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      box-sizing: border-box;
    }
    .box {
      width: 100%;
      max-width: 700px;
      background: #111827;
      border: 2px solid #22c55e;
      border-radius: 20px;
      padding: 28px;
      text-align: center;
      box-shadow: 0 0 30px rgba(34,197,94,.25);
    }
    h1 {
      font-size: 40px;
      margin: 0 0 16px;
      color: #22c55e;
    }
    p {
      font-size: 22px;
      margin: 0;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="box">
      <h1>TEST OK</h1>
      <p>Nếu bạn thấy khung này, GitHub Pages đã chạy đúng.</p>
    </div>
  </div>
</body>
</html>
