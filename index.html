<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doanlifestyle Pro Max 50K</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#4e342e,#8d6e63);
  color:white;
  padding:20px;
}

.container{
  max-width:1000px;
  margin:auto;
}

h1{
  font-size:32px;
  margin-bottom:10px;
}

.card{
  background:#f5ede6;
  color:#3e2723;
  padding:20px;
  border-radius:20px;
  margin-bottom:15px;
}

textarea{
  width:100%;
  height:220px;
  border-radius:12px;
  padding:10px;
  border:none;
}

input{
  width:100%;
  padding:10px;
  border-radius:12px;
  border:none;
  margin-top:10px;
}

.buttons{
  display:flex;
  gap:10px;
  margin-top:10px;
}

button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
}

.green{background:#6d4c41;color:white}
.blue{background:#8d6e63;color:white}
.orange{background:#c8a98b;color:black}
.red{background:#a1887f;color:white}

.voice{
  background:#fff;
  padding:10px;
  border-radius:10px;
  margin-top:8px;
  cursor:pointer;
}

.voice.active{
  border:2px solid #6d4c41;
}

.status{
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>☕ Doanlifestyle Pro Max 50K</h1>

<div class="card">

<textarea id="text">Xin chào bạn...</textarea>
<p><span id="count">0</span> / 50000 ký tự</p>

<input id="apiKey" placeholder="Dán API key">

<div class="buttons">
<button class="green" onclick="generate()">Tạo audio</button>
<button class="blue" onclick="play()">Phát</button>
<button class="orange" onclick="download()">Tải</button>
<button class="red" onclick="reset()">Reset</button>
</div>

<audio id="audio" controls></audio>

<p class="status" id="status">Sẵn sàng...</p>

</div>

<div class="card">

<h3>🎙️ Chọn giọng</h3>

<div id="voices"></div>

</div>

</div>

<script>

let audioBlob = null;
let selectedVoice = "fable";

const voiceList = [
"alloy","ash","ballad","coral","echo",
"fable","nova","onyx","sage","shimmer"
];

function renderVoices(){
  let box = document.getElementById("voices");
  box.innerHTML="";

  voiceList.forEach(v=>{
    let div=document.createElement("div");
    div.className="voice"+(v===selectedVoice?" active":"");
    div.innerText=v;

    div.onclick=()=>{
      selectedVoice=v;
      renderVoices();
    }

    box.appendChild(div);
  });
}

renderVoices();

function updateCount(){
  let t=document.getElementById("text").value.length;
  document.getElementById("count").innerText=t;
}

document.getElementById("text").addEventListener("input",updateCount);
updateCount();

async function generate(){

  let text=document.getElementById("text").value;
  let key=document.getElementById("apiKey").value;

  if(text.length>50000){
    alert("Quá 50K ký tự");
    return;
  }

  if(!key){
    alert("Thiếu API key");
    return;
  }

  document.getElementById("status").innerText="Đang tạo...";

  try{

    let res=await fetch("https://api.openai.com/v1/audio/speech",{
      method:"POST",
      headers:{
        "Authorization":"Bearer "+key,
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        model:"gpt-4o-mini-tts",
        voice:selectedVoice,
        input:text
      })
    });

    if(!res.ok){
      let err=await res.text();
      throw new Error(err);
    }

    audioBlob=await res.blob();

    document.getElementById("status").innerText="✅ Đã tạo xong";

  }catch(e){
    document.getElementById("status").innerText="❌ "+e.message;
  }
}

function play(){
  if(!audioBlob){
    alert("Chưa có audio");
    return;
  }
  let url=URL.createObjectURL(audioBlob);
  document.getElementById("audio").src=url;
}

function download(){
  if(!audioBlob){
    alert("Chưa có audio");
    return;
  }
  let url=URL.createObjectURL(audioBlob);
  let a=document.createElement("a");
  a.href=url;
  a.download="audio.mp3";
  a.click();
}

function reset(){
  document.getElementById("text").value="";
  updateCount();
}

</script>

</body>
</html>
